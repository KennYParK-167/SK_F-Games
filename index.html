<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK F-Games</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- NAVBAR ACCUMULATIVE -->
    <nav class="navbar" id="main-navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo">SK F-Games</a>

            <!-- Menu Desktop / Conteneur Navigation -->
            <div class="nav-menu" id="nav-menu">
                <!-- Dropdown Catégories -->
                <div class="custom-dropdown" id="category-dropdown">
                    <button class="dropdown-btn" id="dropdown-btn">
                        <span id="selected-value">Toutes Plateformes</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="dropdown-list">
                        <div class="dropdown-item active" data-value="all">Toutes Plateformes</div>
                        <div class="dropdown-item" data-value="GOG">GOG</div>
                        <div class="dropdown-item" data-value="Repacks">Repacks</div>
                        <div class="dropdown-item" data-value="PS4">PS4</div>
                    </div>
                </div>

                <!-- Zone d'actions utilisateur -->
                <div class="auth-zone">
                    <button id="auth-btn" class="btn btn-stealth">
                        <i class="fa-solid fa-user"></i> <span id="auth-btn-text">Se connecter</span>
                    </button>
                    <button id="wishlist-toggle" class="btn btn-stealth hidden">
                        <i class="fa-solid fa-heart"></i> Mon Profil
                    </button>
                </div>
            </div>

            <!-- Barre de recherche responsive -->
            <div class="search-container">
                <button class="search-toggle" id="search-toggle-btn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <div class="search-box" id="search-box">
                    <input type="text" id="search-input" placeholder="Rechercher un jeu...">
                </div>
            </div>

            <!-- Bouton Burger Mobile -->
            <button class="burger-btn" id="burger-btn" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- SECTION DES JEUX -->
    <main class="main-content">
        <div class="games-grid" id="games-container">
            <!-- Injecté par JS -->
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination-container">
            <!-- Injecté par JS -->
        </div>
    </main>

    <!-- TEMPLATE CARTE JEU -->
    <template id="game-card-template">
        <div class="game-card">
            <div class="img-container">
                <img class="game-img" src="" alt="">
                <button class="wishlist-btn" title="Ajouter aux favoris">
                    <i class="fa-regular fa-heart"></i>
                </button>
            </div>
            <div class="game-info">
                <span class="game-category"></span>
                <h3 class="game-title"></h3>
                <div class="card-actions">
                    <a class="btn btn-download download-btn" href="" target="_blank">Télécharger</a>
                    <button class="btn btn-specs config-specs-btn"><i class="fa-solid fa-microchip"></i></button>
                </div>
            </div>
        </div>
    </template>

    <!-- MODALE AUTHENTIFICATION (Connexion / Inscription) -->
    <div class="modal" id="auth-modal">
        <div class="modal-content auth-card">
            <button class="close-btn" id="close-auth-btn">&times;</button>
            
            <div class="auth-tabs">
                <button class="auth-tab-btn active" id="tab-login-btn">Connexion</button>
                <button class="auth-tab-btn" id="tab-register-btn">Inscription</button>
            </div>

            <!-- Formulaire Connexion -->
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Mot de passe</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-submit">Se connecter</button>
            </form>

            <!-- Formulaire Inscription -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="register-password">Mot de passe (6 caractères min.)</label>
                    <input type="password" id="register-password" required minlength="6" placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-submit">Créer mon compte</button>
            </form>
            <p id="auth-message" class="auth-message"></p>
        </div>
    </div>

    <!-- FENÊTRE MODALE : SPÉCIFICATIONS TECHNIQUES -->
    <div class="modal" id="config-modal">
        <div class="modal-content">
            <button class="close-btn" id="close-modal-btn">&times;</button>
            <h2 id="modal-game-title" class="modal-title"></h2>
            
            <div class="tabs">
                <button class="tab-btn active" data-tab="min">Configuration Minimale</button>
                <button class="tab-btn" data-tab="rec">Configuration Recommandée</button>
            </div>
            
            <div class="tab-content">
                <ul class="config-list active" id="config-min"></ul>
                <ul class="config-list" id="config-rec"></ul>
            </div>
        </div>
    </div>

    <!-- SDK Supabase officiel -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
